name: Bedrock AFK Bot 24/7

on:
  schedule:
    - cron: '0 */2 * * *' # إعادة تشغيل كاملة كل ساعتين
  workflow_dispatch:
  push:
    branches: [ main, master ]

concurrency:
  group: bedrock-afk-bot
  cancel-in-progress: true # يمنع تراكم البوتات في السيرفر

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🟢 تهيئة بيئة Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: 🤖 تشغيل بوت الأفروة المضاد للطرد
        timeout-minutes: 340 
        # حلقة التكرار (while loop) تضمن إعادة تشغيل البوت فوراً إذا انهار الكود
        run: |
          while true; do
            echo "🔄 بدء تشغيل البوت..."
            node bot.js
            echo "⚠️ البوت توقف، إعادة التشغيل بعد 10 ثوانٍ..."
            sleep 10
          done
